name: update readme images
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create images folder
        run: mkdir -p images
      - name: Fetch stats card
        run: curl -s "https://github-readme-stats-fast.vercel.app/api?username=Bhuvaneshwaran2002&show_icons=true&theme=chartreuse-dark&hide_border=true&count_private=true&bg_color=0d1117" -o images/stats.svg
      - name: Fetch top languages card
        run: curl -s "https://github-readme-stats-fast.vercel.app/api/top-langs/?username=Bhuvaneshwaran2002&layout=compact&theme=chartreuse-dark&hide_border=true&bg_color=0d1117" -o images/top-langs.svg
      - name: Fetch trophies
        run: curl -s "https://github-profile-trophy-liard-delta.vercel.app/?username=Bhuvaneshwaran2002&theme=algolia&no-frame=true&row=2&column=3&margin-w=8&margin-h=8" -o images/trophies.svg
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats/trophy images" && git push)
